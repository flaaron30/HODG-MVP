services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hodg
      POSTGRES_PASSWORD: hodg
      POSTGRES_DB: hodg
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  ai-service:
    build:
      context: .
      dockerfile: infra/docker/ai-service.Dockerfile
    ports: ["8000:8000"]

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env
    depends_on: [postgres, redis, ai-service]
    ports: ["4000:4000"]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on: [api]
    ports: ["5173:5173"]

volumes:
  postgres_data:
